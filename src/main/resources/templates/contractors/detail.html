<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${contractor.name}">Contractor</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="top-bar">
    <div class="brand-heading">
        <img th:src="@{/images/nh-hygiene-logo.png}" alt="NH Hygiene Services Ltd." class="brand-logo">
        <div>
            <p class="eyebrow">Contractor Info</p>
            <h1 th:text="${contractor.name}">Contractor</h1>
        </div>
    </div>
    <nav class="top-nav" aria-label="Primary">
        <a th:href="@{/contractors}" class="secondary-button">Back</a>
        <a th:href="@{/contractors/{id}/edit(id=${contractor.id})}" class="primary-button">Edit Info</a>
    </nav>
</header>

<main class="page">
    <div th:if="${message}" class="alert alert-success" th:text="${message}"></div>

    <section class="detail-grid">
        <div class="info-box">
            <span>Full Name</span>
            <strong th:text="${contractor.name}">Name</strong>
        </div>
        <div class="info-box">
            <span>Number</span>
            <strong th:text="${contractor.phoneNumber ?: '-'}">Phone</strong>
        </div>
        <div class="info-box">
            <span>Address</span>
            <strong th:text="${contractor.address ?: '-'}">Address</strong>
        </div>
        <div class="info-box">
            <span>Money Paid To Date</span>
            <strong th:text="${#numbers.formatCurrency(contractor.amountPaidToDate)}">$0.00</strong>
        </div>
        <div class="info-box">
            <span>Money Owed</span>
            <strong class="amount-unpaid" th:text="${#numbers.formatCurrency(contractor.amountUnpaid)}">$0.00</strong>
        </div>
        <div class="info-box detail-notes">
            <span>Notes</span>
            <strong th:text="${contractor.notes ?: '-'}">Notes</strong>
        </div>
    </section>

    <section class="detail-section">
        <div class="section-heading">
            <h2>Work Sites</h2>
            <button type="button" class="primary-button" data-modal-target="work-site-modal">Worksite</button>
        </div>

        <div class="site-card-grid" th:if="${!#lists.isEmpty(contractor.workSites)}">
            <div class="site-card" th:each="site : ${contractor.workSites}">
                <strong th:text="${site.location}">Location</strong>
                <span th:text="${site.squareArea} + ' sq ft'">0 sq ft</span>
            </div>
        </div>
        <p th:if="${#lists.isEmpty(contractor.workSites)}" class="empty-state">No work sites added.</p>
    </section>

    <div id="work-site-modal" class="modal-backdrop" hidden>
        <section class="modal-panel" role="dialog" aria-modal="true" aria-labelledby="work-site-title">
            <div class="modal-header">
                <div>
                    <p class="eyebrow" th:text="${contractor.name}">Contractor</p>
                    <h2 id="work-site-title">Add Work Site</h2>
                </div>
                <button type="button" class="secondary-button modal-close">Close</button>
            </div>

            <form th:action="@{/contractors/{contractorId}/work-sites(contractorId=${contractor.id})}" method="post" class="form-stack">
                <label>
                    Work Site Location
                    <input type="text" name="location" placeholder="House, building, or site address" required>
                </label>

                <div class="form-grid">
                    <label>
                        Quoted Amount
                        <input type="number" name="quotedAmount" min="0" step="0.01" required>
                    </label>

                    <label>
                        Square Area
                        <input type="number" name="squareArea" min="0" step="0.01" required>
                    </label>
                </div>

                <button type="submit" class="primary-button">Save Work Site</button>
            </form>
        </section>
    </div>
</main>
<script>
    document.querySelectorAll("[data-modal-target]").forEach((button) => {
        button.addEventListener("click", () => {
            document.getElementById(button.dataset.modalTarget).hidden = false;
        });
    });

    document.querySelectorAll(".modal-close").forEach((button) => {
        button.addEventListener("click", () => {
            button.closest(".modal-backdrop").hidden = true;
        });
    });

    document.querySelectorAll(".modal-backdrop").forEach((backdrop) => {
        backdrop.addEventListener("click", (event) => {
            if (event.target === backdrop) {
                backdrop.hidden = true;
            }
        });
    });
</script>
</body>
</html>
