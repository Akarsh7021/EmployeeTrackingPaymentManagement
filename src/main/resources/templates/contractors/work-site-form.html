<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Work Site</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="top-bar">
    <div class="brand-heading">
        <img th:src="@{/images/nh-hygiene-logo.png}" alt="NH Hygiene Services Ltd." class="brand-logo">
        <div>
            <p class="eyebrow" th:text="${contractor.name}">Contractor</p>
            <h1 th:text="${pageTitle}">Work Site</h1>
        </div>
    </div>
    <a th:href="@{/contractors}" class="secondary-button">Back</a>
</header>

<main class="page narrow-page">
    <form th:object="${workSiteForm}"
          th:action="${workSiteForm.id == null}
              ? @{/contractors/{contractorId}/work-sites(contractorId=${contractor.id})}
              : @{/contractors/{contractorId}/work-sites/{workSiteId}(contractorId=${contractor.id},workSiteId=${workSiteForm.id})}"
          method="post"
          class="form-panel">

        <label>
            Work Site Location
            <input type="text" th:field="*{location}" placeholder="House, building, or site address" required>
            <span class="field-error" th:errors="*{location}"></span>
        </label>

        <div class="form-grid">
            <label>
                Quoted Amount
                <input type="number" th:field="*{quotedAmount}" min="0" step="0.01" required>
                <span class="field-error" th:errors="*{quotedAmount}"></span>
            </label>

            <label>
                Square Area
                <input type="number" th:field="*{squareArea}" min="0" step="0.01" required>
                <span class="field-error" th:errors="*{squareArea}"></span>
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="primary-button">Save Work Site</button>
            <a th:href="@{/contractors}" class="secondary-button">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
