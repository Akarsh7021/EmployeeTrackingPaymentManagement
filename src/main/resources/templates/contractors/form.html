<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${pageTitle}">Contractor</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
</head>
<body>
<header class="top-bar">
    <div class="brand-heading">
        <img th:src="@{/images/nh-hygiene-logo.png}" alt="NH Hygiene Services Ltd." class="brand-logo">
        <div>
            <p class="eyebrow">Contract Management</p>
            <h1 th:text="${pageTitle}">Contractor</h1>
        </div>
    </div>
    <a th:href="@{/contractors}" class="secondary-button">Back</a>
</header>

<main class="page narrow-page">
    <form th:object="${contractorForm}"
          th:action="${contractorForm.id == null} ? @{/contractors} : @{/contractors/{id}(id=${contractorForm.id})}"
          method="post"
          class="form-panel">

        <label>
            Contractor Name
            <input type="text" th:field="*{name}" required>
            <span class="field-error" th:errors="*{name}"></span>
        </label>

        <label>
            Phone Number
            <input type="text" th:field="*{phoneNumber}">
            <span class="field-error" th:errors="*{phoneNumber}"></span>
        </label>

        <div class="form-grid">
            <label>
                Amount Paid To Date
                <input type="number" th:field="*{amountPaidToDate}" min="0" step="0.01" required>
                <span class="field-error" th:errors="*{amountPaidToDate}"></span>
            </label>

            <label>
                Amount Unpaid
                <input type="number" th:field="*{amountUnpaid}" min="0" step="0.01" required>
                <span class="field-error" th:errors="*{amountUnpaid}"></span>
            </label>
        </div>

        <div class="form-actions">
            <button type="submit" class="primary-button">Save Contractor</button>
            <a th:href="@{/contractors}" class="secondary-button">Cancel</a>
        </div>
    </form>
</main>
</body>
</html>
